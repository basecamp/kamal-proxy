services:
  proxy:
    build: ../
    ports:
      - 127.0.0.1:80:80
      - 127.0.0.1:443:443
    restart: unless-stopped
    command: [ "kamal-proxy", "run", "--debug", "--metrics-port=9000" ]

  web1:
    build: ./upstream
    hostname: web1
    restart: unless-stopped

  web2:
    build: ./upstream
    hostname: web2
    restart: unless-stopped

  web3:
    build: ./upstream
    hostname: web3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    ports:
      - 127.0.0.1:9090:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
